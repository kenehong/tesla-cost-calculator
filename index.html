<script>
function toggleTheme(){
  const d=document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme',d?'dark':'light');
}
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',e=>{
  if(!localStorage.getItem('theme')){document.documentElement.classList.toggle('dark',e.matches)}
});

let TESLA_MODELS={
  model3:{name:'Model 3',wt:38,trims:{standard:{name:'RWD',price:38990},longRange:{name:'Long Range AWD',price:46990},performance:{name:'Performance',price:54990}}},
  modelY:{name:'Model Y',wt:53,trims:{standard:{name:'RWD',price:39990},awd:{name:'AWD',price:41990},longRange:{name:'Long Range AWD',price:48990},performance:{name:'Performance',price:57490}}},
  modelS:{name:'Model S',wt:65,trims:{awd:{name:'AWD',price:84990},plaid:{name:'Plaid',price:109990}}},
  modelX:{name:'Model X',wt:72,trims:{awd:{name:'AWD',price:89990},plaid:{name:'Plaid',price:114990}}},
  cybertruck:{name:'Cybertruck',wt:92,trims:{awd:{name:'AWD',price:61990},premium:{name:'Premium',price:81990},cyberbeast:{name:'Cyberbeast',price:99990}}},
  custom:{name:'Custom',wt:53,trims:{custom:{name:'Custom',price:0}}}
};

async function loadPrices(){
  try{
    const res=await fetch('prices.json');
    if(!res.ok)return;
    const data=await res.json();
    if(data.models){
      for(const[k,v]of Object.entries(data.models)){
        if(TESLA_MODELS[k]){
          TESLA_MODELS[k].name=v.name||TESLA_MODELS[k].name;
          TESLA_MODELS[k].wt=v.wt||TESLA_MODELS[k].wt;
          if(v.trims)TESLA_MODELS[k].trims={...TESLA_MODELS[k].trims,...v.trims};
        }
      }
    }
    const badge=document.getElementById('sync-badge');
    const txt=document.getElementById('sync-text');
    if(badge&&txt&&data.lastUpdated){
      txt.textContent=`Prices: ${data.lastUpdated}`;
      badge.title=`Auto-synced weekly from tesla.com\nLast updated: ${data.lastUpdated}`;
    }
    // Update current car prices to match loaded data
    for(const car of state.cars){
      if(car.model!=='custom'){
        const t=TESLA_MODELS[car.model]?.trims[car.trim];
        if(t)car.price=t.price;
      }
    }
    render();
  }catch(e){/* fallback to hardcoded */}
}

function lookupZip(zip){if(!zip||zip.length<5)return null;const z=zip.trim().slice(0,5);for(const c of WA_CITIES){if(c.zips.includes(z))return{name:c.name,rate:c.rate,rta:c.rta}}return null}
function filterCities(q){if(!q)return WA_CITIES;const l=q.toLowerCase();if(/^\d/.test(l))return WA_CITIES.filter(c=>c.zips.some(z=>z.startsWith(l)));return WA_CITIES.filter(c=>c.name.toLowerCase().includes(l))}

const FEES={
  dest:1390, order:250,
  filing:12.50, titleSvc:18, regSvc:11, plates:50, plateRefl:4, tab:30,
  evReg:150, evAdd:50, evElec:75,
  luxRate:0.08, luxThreshold:100000
};

const state={
  shared:{zip:'',taxRate:10.5,taxName:'',rta:1},
  cars:[{model:'modelY',trim:'awd',price:41990,tradeIn:0,down:5000,apr:6.5,term:60,fsd:false}],
  cc:{enabled:false,payment:0,apr:0,endDate:'',balance:0,tradeValue:0,maintenance:0},
  mobileTab:0,
  modalFor:-1
};

function calcCar(car,sh){
  const{price,tradeIn,down,apr,term}=car;
  const isCustom=car.model==='custom';
  const wt=TESLA_MODELS[car.model]?.wt||53;
  const taxable=Math.max(price-Math.max(tradeIn,0),0);
  const tax=taxable*(sh.taxRate/100);
  const regFees=FEES.filing+FEES.titleSvc+FEES.regSvc+FEES.plates+FEES.plateRefl+FEES.tab;
  const evFees=FEES.evReg+FEES.evAdd+FEES.evElec;
  const rta=sh.rta?Math.round(price*0.011):0;
  const luxTax=price>FEES.luxThreshold?Math.round((price-FEES.luxThreshold)*FEES.luxRate):0;
  const gov=regFees+evFees+wt+rta+luxTax;
  const financed=Math.max(price-tradeIn+tax+gov-down,0);
  let monthly=0,totalInt=0,totalPaid=0;const sched=[];
  if(apr===0||financed===0){monthly=term>0?financed/term:0;totalPaid=financed;let b=financed;for(let i=1;i<=term;i++){b-=monthly;sched.push({n:i,pmt:monthly,p:monthly,i:0,b:Math.max(b,0)})}}
  else{const r=apr/100/12;monthly=financed*(r*Math.pow(1+r,term))/(Math.pow(1+r,term)-1);totalPaid=monthly*term;totalInt=totalPaid-financed;let b=financed;for(let i=1;i<=term;i++){const ip=b*r,pp=monthly-ip;b-=pp;sched.push({n:i,pmt:monthly,p:pp,i:ip,b:Math.max(b,0)})}}
  const fsdMonthly=car.fsd?99:0,fsdTotal=fsdMonthly*term;
  return{price,tradeIn,down,taxRate:sh.taxRate,tax,regFees,evFees,weightFee:wt,rta,luxTax,gov,financed,monthly,totalPaid:totalPaid+fsdTotal,totalInt,sched,isCustom,apr,term,fsdMonthly,fsdTotal};
}

function monthsUntil(d){
  if(!d)return 0;
  const p=d.split('-');
  const ey=parseInt(p[0]),em=parseInt(p[1])-1,n=new Date();
  return Math.max((ey-n.getFullYear())*12+(em-n.getMonth()),0);
}

function calcTrade(cc,r){
  if(!cc.enabled)return null;
  const months=monthsUntil(cc.endDate),equity=cc.tradeValue-cc.balance,mDiff=r.monthly-cc.payment;
  const netCost=r.totalPaid+r.down-(equity>0?equity:0),keepCost=cc.payment*months+(cc.maintenance/12)*60;
  const verdict=keepCost>0&&netCost>0?(netCost<=keepCost?'switch':'keep'):null;
  const projection=[];let peakEquity=equity,peakMonth=0,flipMonth=-1;const mr=cc.apr>0?cc.apr/100/12:0;let bal=cc.balance;
  for(let m=0;m<=24;m++){const carVal=cc.tradeValue*Math.pow(0.99,m),eq=carVal-bal;projection.push({m,bal:Math.round(bal),val:Math.round(carVal),eq:Math.round(eq)});if(eq>peakEquity){peakEquity=eq;peakMonth=m}if(flipMonth<0&&equity<0&&eq>=0)flipMonth=m;if(bal>0&&m<months)bal=Math.max(bal-(cc.payment-bal*mr),0);else if(m>=months)bal=0}
  const timing=[],ins=[];
  if(cc.balance>0&&cc.tradeValue>0){if(equity<0&&flipMonth>0)timing.push(`Equity turns positive in ${flipMonth}mo`);if(peakMonth>0&&equity>=0)timing.push(`Peak at ${peakMonth>=24?'24mo+':peakMonth+'mo'}, Equity $${fI(Math.round(peakEquity))}`);if(months>0&&months<=12){const le=projection.find(p=>p.m===months);if(le)timing.push(`Loan payoff at ${months}mo, Equity $${fI(le.eq)}`)}if(months===0&&cc.endDate)timing.push('Fully paid off! Best time to trade')}
  if(verdict==='keep')ins.push(`Keep saves $${fI(Math.abs(netCost-keepCost))} over 5yr`);else if(verdict==='switch')ins.push(`Switch saves $${fI(keepCost-netCost)} over 5yr`);
  if(equity<0)ins.push(`Underwater $${fI(Math.abs(equity))}`);else if(equity>0)ins.push(`Equity $${fI(equity)} available`);
  if(mDiff<0)ins.push('New car payment is actually lower!');
  return{equity,mDiff,netCost,months,keepCost,switchCost:netCost,verdict,ins,timing,projection,peakMonth,peakEquity};
}

function f2(n){return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fI(n){return Math.round(n).toLocaleString('en-US')}
function fC(n){return'$'+fI(n)}
function pN(v){return parseFloat(String(v).replace(/,/g,''))||0}

function renderCCFields(cc){
  const f=(label,pre,suf,val,key)=>`<div>
    <span class="text-[11px] text-muted-fg mb-1.5 block uppercase tracking-wider">${label}</span>
    <label class="inp">${pre?`<span class="text-xs text-muted-fg">${pre}</span>`:''}<input type="text" value="${val}" data-cc="${key}">${suf?`<span class="text-xs text-muted-fg">${suf}</span>`:''}</label></div>`;
  return f('Monthly Payment','$','',fI(cc.payment||0),'payment')
    +f('APR','','%',cc.apr!=null?cc.apr:'0','apr')
    +`<div><span class="text-[11px] text-muted-fg mb-1.5 block uppercase tracking-wider">Loan End</span>
      <input type="month" class="h-9 w-full rounded-md border border-border bg-secondary px-3 text-sm text-foreground outline-none font-mono focus:border-primary transition-colors" value="${cc.endDate}" data-cc="endDate"></div>`
    +f('Balance','$','',fI(cc.balance||0),'balance')
    +f('Trade Value','$','',fI(cc.tradeValue||0),'tradeValue')
    +f('Maintenance/yr','$','',fI(cc.maintenance||0),'maintenance');
}

  if(state.modalFor>=0&&state.modalFor<state.cars.length){
    const mi=state.modalFor,car=state.cars[mi],r=res[mi],t=tra[mi];
    const mn=TESLA_MODELS[car.model]?.name||'Custom';
    h+=`<div class="modal-overlay" data-modalclose>
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-5">
          <h3 class="text-sm font-semibold uppercase tracking-wider">${mn} — Breakdown</h3>
          <button class="size-8 flex items-center justify-center rounded-md text-muted-fg hover:text-foreground hover:bg-secondary transition-colors cursor-pointer" data-modalclose>${ICO.x}</button>
        </div>
        ${renderBD(r)}
        <div class="h-px bg-border my-5"></div>
        <h4 class="text-[10px] font-semibold mb-3 uppercase tracking-[0.1em] text-muted-fg">Amortization Schedule</h4>
        ${renderSched(r.sched)}
        ${t?`<div class="h-px bg-border my-5"></div>${renderTA(t)}`:''}
      </div>
    </div>`;
  }

  app.innerHTML=h;

  if(fSel){const el=app.querySelector(fSel);if(el){if(fVal!==null)el.value=fVal;el.focus();if(fCur!==null)try{el.setSelectionRange(fCur,fCur)}catch(e){}}}
  rendering=false;
}

function renderBD(r){
  const rows=[
    {l:'Vehicle Price',v:fC(r.price),sub:'Includes $1,390 dest + $250 order'},
    {l:`Sales Tax (${r.taxRate}%)`,v:fC(r.tax),c:'text-warning'},
    {l:'Registration & Title',v:fC(r.regFees),c:'text-muted-fg'},
    {l:'EV Fees',v:fC(r.evFees),c:'text-muted-fg',sub:'$150 EV Reg + $50 Add + $75 Elec'},
    {l:'Weight Fee',v:fC(r.weightFee),c:'text-muted-fg'},
    ...(r.rta>0?[{l:'RTA Tax (1.1%)',v:fC(r.rta),c:'text-warning',sub:'Sound Transit MVET'}]:[]),
    ...(r.luxTax>0?[{l:'Luxury Tax (8%)',v:fC(r.luxTax),c:'text-destructive',sub:'Over $100K surcharge'}]:[]),
    ...(r.down>0?[{l:'Down Payment',v:'-'+fC(r.down),c:'text-primary'}]:[]),
    ...(r.tradeIn>0?[{l:'Trade-In Credit',v:'-'+fC(r.tradeIn),c:'text-primary'}]:[]),
    ...(r.tradeIn<0?[{l:'Underwater',v:'+'+fC(Math.abs(r.tradeIn)),c:'text-destructive'}]:[]),
    {l:'Amount Financed',v:fC(r.financed)},
    {l:'Total Interest',v:fC(r.totalInt),c:'text-destructive'},
    ...(r.fsdTotal>0?[{l:'FSD Subscription',v:fC(r.fsdTotal),c:'text-primary',sub:`$99/mo × ${r.term}mo`}]:[]),
    {l:'Total Cost',v:fC(r.totalPaid+r.down),c:'font-semibold',total:1}
  ];
  let h='<div><h4 class="text-[10px] font-semibold mb-3 uppercase tracking-[0.1em] text-muted-fg">Itemized Cost</h4><div class="flex flex-col gap-1.5">';
  rows.forEach(r=>{h+=`<div class="flex flex-col ${r.total?'border-t border-border pt-2 mt-1':''}"><div class="flex items-center justify-between text-xs"><span class="text-muted-fg">${r.l}</span><span class="font-mono ${r.c||''}">${r.v}</span></div>${r.sub?`<p class="text-[9px] text-muted-fg/60 mt-0.5">${r.sub}</p>`:''}</div>`});
  h+=`</div><div class="mt-3 pt-3 border-t border-border/50"><div class="flex justify-between text-[10px] text-muted-fg"><span>Gov Fees Total</span><span class="font-mono">${fC(r.gov)}</span></div></div>`;
  h+=`<div class="mt-3 pt-2 border-t border-border/30"><p class="text-[8px] text-muted-fg/40 leading-relaxed">Fees are estimates and may vary. Sources: <a href="https://www.dol.wa.gov/vehicles-and-boats/vehicle-title-and-registration/vehicle-registration-fees" target="_blank" class="underline hover:text-muted-fg/60">WA DOL</a> · <a href="https://lawfilesext.leg.wa.gov/biennium/2025-26/Pdf/Bills/Session%20Laws/Senate/5801-S.SL.pdf" target="_blank" class="underline hover:text-muted-fg/60">SB 5801</a> · <a href="https://www.soundtransit.org/ride-with-us/how-to-pay/fares" target="_blank" class="underline hover:text-muted-fg/60">Sound Transit</a> · <a href="https://www.tesla.com" target="_blank" class="underline hover:text-muted-fg/60">tesla.com</a></p></div></div>`;
  return h;
}

function renderSched(sched){
  if(!sched.length)return'';
  let h=`<div class="rounded-lg border border-border overflow-hidden"><div class="amort-wrap"><table class="w-full text-xs">
    <thead><tr class="bg-secondary/50">
      <th class="text-left text-muted-fg font-medium px-3 py-2 text-[10px] uppercase tracking-wider">Mo</th>
      <th class="text-right text-muted-fg font-medium px-3 py-2 text-[10px] uppercase tracking-wider">Pmt</th>
      <th class="text-right text-muted-fg font-medium px-3 py-2 text-[10px] uppercase tracking-wider">Princ</th>
      <th class="text-right text-muted-fg font-medium px-3 py-2 text-[10px] uppercase tracking-wider">Int</th>
      <th class="text-right text-muted-fg font-medium px-3 py-2 text-[10px] uppercase tracking-wider">Bal</th>
    </tr></thead><tbody>`;
  sched.forEach(s=>{h+=`<tr class="border-t border-border/50 hover:bg-secondary/30"><td class="px-3 py-1.5 font-mono text-muted-fg">${s.n}</td><td class="px-3 py-1.5 font-mono text-right">$${f2(s.pmt)}</td><td class="px-3 py-1.5 font-mono text-right text-primary">$${f2(s.p)}</td><td class="px-3 py-1.5 font-mono text-right text-destructive">$${f2(s.i)}</td><td class="px-3 py-1.5 font-mono text-right text-muted-fg">$${f2(s.b)}</td></tr>`});
  return h+'</tbody></table></div></div>';
}

function renderTA(t){
  const isS=t.verdict==='switch';
  let h=`<div class="flex flex-col gap-4 rounded-lg bg-secondary/40 p-4">
    <div class="flex items-center justify-between">
      <h4 class="text-xs font-semibold uppercase tracking-wider">Trade-In Analysis</h4>
      ${t.verdict?`<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold ${isS?'bg-success text-success-fg':'bg-destructive text-destructive-fg'}">${isS?'Switch':'Keep'}</span>`:''}
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div class="rounded-lg bg-card/50 p-3">
        <p class="text-[9px] uppercase tracking-[0.1em] text-muted-fg mb-1">Keep Current</p>
        <p class="text-sm font-semibold font-mono">${fC(state.cc.payment)}<span class="text-muted-fg font-normal text-xs">/mo</span></p>
        ${state.cc.maintenance>0?`<p class="text-[10px] text-muted-fg mt-0.5">+ ${fC(Math.round(state.cc.maintenance/12))}/mo maint.</p>`:''}
      </div>
      <div class="rounded-lg bg-card/50 p-3">
        <p class="text-[9px] uppercase tracking-[0.1em] text-muted-fg mb-1">Switch to Tesla</p>
        <p class="text-sm font-semibold font-mono text-primary">${fC(Math.round(t.mDiff+state.cc.payment>0?t.mDiff+state.cc.payment:0))}<span class="text-muted-fg font-normal text-xs">/mo</span></p>
        <p class="text-[10px] ${t.mDiff<=0?'text-success':'text-destructive'} mt-0.5">${t.mDiff<=0?'Save':'Costs'} ${fC(Math.abs(Math.round(t.mDiff)))}/mo</p>
      </div>
    </div>
    <div class="space-y-1 text-xs">
      <div class="flex justify-between"><span class="text-muted-fg">Remaining Loan</span><span class="font-mono font-semibold">${t.months}mo</span></div>
      <div class="flex justify-between"><span class="text-muted-fg">Equity</span><span class="font-mono font-semibold ${t.equity>=0?'text-success':'text-destructive'}">${t.equity>=0?'+':'-'}${fC(Math.abs(t.equity))}</span></div>
      <div class="flex justify-between"><span class="text-muted-fg">Keep 5yr Cost</span><span class="font-mono">${fC(t.keepCost)}</span></div>
      <div class="flex justify-between"><span class="text-muted-fg">Switch Total</span><span class="font-mono">${fC(t.switchCost)}</span></div>
    </div>`;

  if(t.projection.length>1&&(t.projection[0].val>0||t.projection[0].bal>0)){
    const pts=t.projection.filter(p=>p.m%6===0),mx=Math.max(...pts.map(p=>Math.abs(p.eq)),1);
    h+=`<div><p class="text-[10px] font-medium text-muted-fg mb-2 uppercase tracking-wider">Equity Timeline</p>
      <div class="flex items-end gap-1.5 h-16">${pts.map(p=>{
        const ht=Math.max(10,(Math.abs(p.eq)/mx)*100);
        return`<div class="flex-1 flex flex-col items-center gap-1"><div class="w-full flex items-end justify-center h-12"><div class="w-full max-w-[20px] rounded-t transition-all ${p.eq>=0?'bg-primary':'bg-destructive'}" style="height:${ht}%"></div></div><span class="text-[8px] text-muted-fg">${p.m===0?'Now':p.m+'mo'}</span></div>`;
      }).join('')}</div></div>`;
  }

  if(t.timing.length||t.ins.length){
    h+=`<div class="flex flex-col gap-2"><p class="text-[10px] font-medium text-muted-fg uppercase tracking-wider">Insights</p>`;
    t.timing.forEach(tip=>{h+=`<div class="flex items-start gap-2">${ICO.clock}<p class="text-[11px] text-muted-fg leading-relaxed">${tip}</p></div>`});
    t.ins.forEach(tip=>{h+=`<div class="flex items-start gap-2">${t.equity>=0?ICO.up:ICO.down}<p class="text-[11px] text-muted-fg leading-relaxed mt-0.5">${tip}</p></div>`});
    h+=`</div>`;
  }
  return h+'</div>';
}

function updateStats(i){
  const car=state.cars[i],ccOn=state.cc.enabled,ccEquity=state.cc.tradeValue-state.cc.balance;
  const eff=ccOn?{...car,tradeIn:ccEquity}:car;
  const r=calcCar(eff,state.shared);
  const card=document.querySelector(`[data-ci="${i}"]`);if(!card)return;
  const monthly=card.querySelector('.text-4xl');if(monthly)monthly.textContent=fC(r.monthly+r.fsdMonthly);
  const stats=card.querySelectorAll('.grid.grid-cols-3 .text-sm.font-semibold');
  if(stats[0])stats[0].textContent=fC(r.totalPaid+r.down);
  if(stats[1])stats[1].textContent=fC(r.financed);
  if(stats[2])stats[2].textContent=fC(r.totalInt);
}

// EVENTS
let rT=null;
function sR(){if(rT)cancelAnimationFrame(rT);rT=requestAnimationFrame(render)}

document.addEventListener('input',e=>{
  const el=e.target;
  if(el.dataset.zip!==undefined){state.shared.zip=el.value;const m=lookupZip(el.value);if(m){state.shared.taxRate=m.rate;state.shared.taxName=m.name;state.shared.rta=m.rta}else{state.shared.taxName=''}sR();return}
  if(el.dataset.shared){const v=el.value;if(v.endsWith('.'))return;state.shared[el.dataset.shared]=parseFloat(v)||0;state.shared.taxName='';sR();return}
  if(el.dataset.cc!==undefined){const k=el.dataset.cc;if(k==='endDate')return;const v=el.value;if(k==='apr'&&v.endsWith('.'))return;state.cc[k]=pN(v);if(!state.cc.enabled&&pN(v)>0)state.cc.enabled=true;sR();return}
  if(el.dataset.price!==undefined){state.cars[+el.dataset.price].price=pN(el.value);sR();return}
  if(el.dataset.ti!==undefined){state.cars[+el.dataset.ti].tradeIn=pN(el.value);sR();return}
  if(el.dataset.dp!==undefined){state.cars[+el.dataset.dp].down=pN(el.value);sR();return}
  if(el.dataset.apr!==undefined){dragging=true;const i=+el.dataset.apr;state.cars[i].apr=parseFloat(el.value)||0;
    const lbl=el.closest('div')?.querySelector('.text-primary');if(lbl)lbl.textContent=el.value+'%';
    updateStats(i);return}
  if(el.dataset.term!==undefined){dragging=true;const i=+el.dataset.term;state.cars[i].term=parseInt(el.value);
    const lbl=el.closest('div')?.querySelector('.text-primary');if(lbl)lbl.textContent=el.value+' mo';
    updateStats(i);return}
});

document.addEventListener('blur',e=>{
  if(e.target.tagName!=='INPUT')return;
  if(!document.getElementById('app').contains(e.target))return;
  const d=e.target.dataset;
  if(d.cc!==undefined||d.price!==undefined||d.ti!==undefined||d.dp!==undefined)render();
},true);

document.addEventListener('change',e=>{
  const el=e.target;
  if(el.dataset.fsd!==undefined){state.cars[+el.dataset.fsd].fsd=el.checked;render();return}
  if(el.dataset.cctoggle!==undefined){state.cc.enabled=el.checked;render();return}
  if(el.dataset.cc==='endDate'){state.cc.endDate=el.value;render();return}
  if(el.dataset.model!==undefined){
    const i=+el.dataset.model,m=el.value;state.cars[i].model=m;
    const first=Object.keys(TESLA_MODELS[m].trims)[0];state.cars[i].trim=first;state.cars[i].price=TESLA_MODELS[m].trims[first].price;render();return}
  if(el.dataset.trim!==undefined){
    const i=+el.dataset.trim,t=el.value;state.cars[i].trim=t;state.cars[i].price=TESLA_MODELS[state.cars[i].model].trims[t].price;render();return}
});

document.addEventListener('click',e=>{
  const cb=e.target.closest('[data-city]');
  if(cb){state.shared.taxRate=parseFloat(cb.dataset.city);state.shared.taxName=cb.dataset.cityname||'';state.shared.rta=+(cb.dataset.cityrta||0);state.shared.zip='';render();return}

  const rm=e.target.closest('[data-rm]');
  if(rm){const i=+rm.dataset.rm;if(state.cars.length>1){state.cars.splice(i,1);if(state.mobileTab>=state.cars.length)state.mobileTab=state.cars.length-1;render()}return}

  if(e.target.closest('[data-add]')||e.target.closest('[data-madd]')){
    if(state.cars.length<3){state.cars.push({model:'model3',trim:'standard',price:38990,tradeIn:0,down:5000,apr:6.5,term:60,fsd:false});state.mobileTab=state.cars.length-1;render()}return}

  const mb=e.target.closest('[data-modal]');
  if(mb){state.modalFor=+mb.dataset.modal;render();return}

  if(e.target.closest('[data-modalclose]')&&!e.target.closest('.modal-box')){state.modalFor=-1;render();return}
  if(e.target.closest('button[data-modalclose]')){state.modalFor=-1;render();return}

  if(e.target.closest('[data-mtab]')){state.mobileTab=+e.target.closest('[data-mtab]').dataset.mtab;render()}
});

document.addEventListener('mouseup',()=>{if(dragging){dragging=false;render()}});
document.addEventListener('touchend',()=>{if(dragging){dragging=false;render()}});

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&state.modalFor>=0){state.modalFor=-1;render()}});

let lW=window.innerWidth;
window.addEventListener('resize',()=>{const w=window.innerWidth;if((lW<=768&&w>768)||(lW>768&&w<=768)||(lW<1024&&w>=1024)||(lW>=1024&&w<1024))render();lW=w});

render();
loadPrices();
</script>
</body>
</html>
